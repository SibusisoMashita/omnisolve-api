spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/omnisolve}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: public
    schemas: public
    create-schemas: true
  docker:
    compose:
      enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/us-east-1_example}

server:
  port: ${SERVER_PORT:8080}

app:
  s3:
    bucket: ${DOCUMENT_BUCKET:omnisolve-documents-dev}
    region: ${AWS_REGION:us-east-1}
  security:
    jwt:
      enabled: ${JWT_ENABLED:false}
    cognito:
      audience: ${COGNITO_AUDIENCE:example-client-id}
