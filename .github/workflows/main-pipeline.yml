name: Main CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  AWS_REGION: us-east-1
  ARTIFACT_NAME: omnisolve-api-0.0.1.jar
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Build artifact once
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      
      - name: Build with Maven
        run: ./mvnw -B package -DskipTests
      
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          retention-days: 30
          if-no-files-found: error
      
      - name: Upload Maven build cache
        uses: actions/upload-artifact@v4
        with:
          name: maven-build-cache
          path: |
            target/classes
            target/generated-sources
            target/maven-status
          retention-days: 1
          if-no-files-found: warn

  # Stage 2: Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: omnisolve_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven
      
      - name: Download Maven build cache
        uses: actions/download-artifact@v4
        with:
          name: maven-build-cache
          path: target
        continue-on-error: true
      
      - name: Run tests
        env:
          DB_URL: jdbc:postgresql://localhost:5432/omnisolve_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_ENABLED: false
        run: ./mvnw -B test

  # Stage 3: Quality gates
  qodana-scan:
    name: Code Quality - Qodana
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      
      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: ${{ github.event_name == 'pull_request' }}
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: true
          push-fixes: 'none'

  # Stage 4: Build Docker image (only on main branch)
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: qodana-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target
      
      - name: Verify artifact
        run: |
          echo "Downloaded artifacts:"
          ls -lh target/
          if [ ! -f "target/${{ env.ARTIFACT_NAME }}" ]; then
            echo "Error: Expected artifact not found"
            exit 1
          fi
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=omnisolve-api
          cache-to: type=gha,mode=max,scope=omnisolve-api
          platforms: linux/amd64,linux/arm64

  # Stage 5: Deploy to DEV
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: qodana-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: development
      url: ${{ steps.beanstalk-url.outputs.url }}
    
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
      
      - name: Verify artifact
        run: |
          echo "Artifact for deployment:"
          ls -lh
          # Artifact is already named correctly, just verify
          if [ ! -f "${{ env.ARTIFACT_NAME }}" ]; then
            echo "Error: Expected artifact not found"
            exit 1
          fi
          echo "Artifact size: $(du -h ${{ env.ARTIFACT_NAME }} | cut -f1)"
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Generate version label
        id: version
        run: |
          VERSION_LABEL="dev-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION_LABEL"
      
      - name: Deploy to Elastic Beanstalk DEV
        id: deploy
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_DEV }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_DEV }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "Commit ${{ github.sha }} by ${{ github.actor }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: ${{ env.ARTIFACT_NAME }}
          wait_for_deployment: true
          wait_for_environment_recovery: 300
      
      - name: Get Elastic Beanstalk URL
        id: beanstalk-url
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME_DEV }}" \
            --query "Environments[0].CNAME" \
            --output text)
          
          if [ "$CNAME" = "None" ] || [ -z "$CNAME" ]; then
            echo "Failed to retrieve Elastic Beanstalk CNAME"
            exit 1
          fi
          
          echo "url=http://$CNAME" >> $GITHUB_OUTPUT
          echo "Retrieved environment URL: http://$CNAME"
      
      - name: Verify DEV deployment
        run: |
          echo "Deployment to DEV completed successfully"
          echo "Environment URL: ${{ steps.beanstalk-url.outputs.url }}"
          sleep 30
          
          HEALTH_URL="${{ steps.beanstalk-url.outputs.url }}/api/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE"
          fi
      
      - name: Create deployment summary
        run: |
          echo "## 🚀 DEV Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** DEV" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.label }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.beanstalk-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY

  # Stage 6: Deploy to PROD (manual approval via environment protection)
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      url: ${{ steps.beanstalk-url.outputs.url }}
    
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
      
      - name: Verify artifact integrity
        run: |
          echo "Deploying the same artifact tested in DEV"
          ls -lh
          # Artifact is already named correctly, just verify
          if [ ! -f "${{ env.ARTIFACT_NAME }}" ]; then
            echo "Error: Expected artifact not found"
            exit 1
          fi
          echo "Artifact checksum:"
          sha256sum ${{ env.ARTIFACT_NAME }}
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Generate version label
        id: version
        run: |
          VERSION_LABEL="prod-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION_LABEL"
      
      - name: Deploy to Elastic Beanstalk PROD
        id: deploy
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_PROD }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_PROD }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "Production release - Commit ${{ github.sha }} by ${{ github.actor }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: ${{ env.ARTIFACT_NAME }}
          wait_for_deployment: true
          wait_for_environment_recovery: 300
      
      - name: Get Elastic Beanstalk URL
        id: beanstalk-url
        run: |
          CNAME=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME_PROD }}" \
            --query "Environments[0].CNAME" \
            --output text)
          
          if [ "$CNAME" = "None" ] || [ -z "$CNAME" ]; then
            echo "Failed to retrieve Elastic Beanstalk CNAME"
            exit 1
          fi
          
          echo "url=http://$CNAME" >> $GITHUB_OUTPUT
          echo "Retrieved environment URL: http://$CNAME"
      
      - name: Verify PROD deployment
        run: |
          echo "Deployment to PROD completed successfully"
          echo "Environment URL: ${{ steps.beanstalk-url.outputs.url }}"
          sleep 30
          
          HEALTH_URL="${{ steps.beanstalk-url.outputs.url }}/api/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE"
          fi
      
      - name: Create deployment summary
        run: |
          echo "## 🎉 PROD Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.label }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.beanstalk-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
