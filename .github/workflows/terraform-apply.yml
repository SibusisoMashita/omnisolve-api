name: Terraform Apply

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-*.yml'

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infrastructure/terraform
    
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      
      - name: Create prod.tfvars from secrets
        run: |
          cat > ../environments/prod.tfvars <<EOF
          project_name         = "omnisolve"
          environment          = "prod"
          aws_region           = "${{ env.AWS_REGION }}"
          vpc_id               = "${{ secrets.TF_VAR_VPC_ID }}"
          private_subnet_ids   = ${{ secrets.TF_VAR_PRIVATE_SUBNET_IDS }}
          allowed_cidr_blocks  = ${{ secrets.TF_VAR_ALLOWED_CIDR_BLOCKS }}
          db_name              = "omnisolve"
          db_username          = "omnisolve"
          db_password          = "${{ secrets.TF_VAR_DB_PASSWORD }}"
          db_instance_class    = "db.t3.micro"
          db_allocated_storage = 20
          s3_bucket_name       = "${{ secrets.TF_VAR_S3_BUCKET_NAME }}"
          EOF
      
      - name: Terraform Init
        run: terraform init
      
      - name: Terraform Plan
        run: terraform plan -var-file=../environments/prod.tfvars -input=false -out=tfplan
      
      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
      
      - name: Output Infrastructure Details
        run: terraform output -json > infrastructure-outputs.json
      
      - name: Upload Infrastructure Outputs
        uses: actions/upload-artifact@v4
        with:
          name: infrastructure-outputs
          path: infrastructure/terraform/infrastructure-outputs.json
          retention-days: 30
