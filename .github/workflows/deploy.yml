name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'corretto'
  ARTIFACT_NAME: omnisolve-api-0.0.1-SNAPSHOT.jar

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

      - name: Verify artifact exists
        run: |
          if [ ! -f "target/${{ env.ARTIFACT_NAME }}" ]; then
            echo "Error: Artifact not found at target/${{ env.ARTIFACT_NAME }}"
            exit 1
          fi
          echo "Artifact found: target/${{ env.ARTIFACT_NAME }}"
          ls -lh target/${{ env.ARTIFACT_NAME }}

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: application-artifact
          path: target/${{ env.ARTIFACT_NAME }}
          retention-days: 30

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: development
      url: http://${{ steps.deploy.outputs.environment_cname }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: application-artifact

      - name: Verify downloaded artifact
        run: |
          ls -lh ${{ env.ARTIFACT_NAME }}
          echo "Artifact size: $(du -h ${{ env.ARTIFACT_NAME }} | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate version label
        id: version
        run: |
          VERSION_LABEL="dev-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION_LABEL"

      - name: Deploy to Elastic Beanstalk DEV
        id: deploy
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_DEV }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_DEV }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "Commit ${{ github.sha }} by ${{ github.actor }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: ${{ env.ARTIFACT_NAME }}
          wait_for_deployment: true
          wait_for_environment_recovery: 300

      - name: Verify DEV deployment
        run: |
          echo "Deployment to DEV completed successfully"
          echo "Environment URL: http://${{ steps.deploy.outputs.environment_cname }}"
          echo "Version Label: ${{ steps.version.outputs.label }}"
          
          # Wait for application to be ready
          sleep 30
          
          # Test health endpoint
          HEALTH_URL="http://${{ steps.deploy.outputs.environment_cname }}/api/health"
          echo "Testing health endpoint: $HEALTH_URL"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE"
            echo "Application may still be starting up"
          fi

      - name: Create deployment summary
        run: |
          echo "## 🚀 DEV Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** DEV" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.label }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ steps.deploy.outputs.environment_cname }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Ready for production approval" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: production
      url: http://${{ steps.deploy.outputs.environment_cname }}
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: application-artifact

      - name: Verify artifact integrity
        run: |
          echo "Deploying the same artifact that was tested in DEV"
          ls -lh ${{ env.ARTIFACT_NAME }}
          echo "Artifact checksum:"
          sha256sum ${{ env.ARTIFACT_NAME }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate version label
        id: version
        run: |
          VERSION_LABEL="prod-$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          echo "label=$VERSION_LABEL" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION_LABEL"

      - name: Deploy to Elastic Beanstalk PROD
        id: deploy
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APPLICATION_NAME_PROD }}
          environment_name: ${{ secrets.EB_ENVIRONMENT_NAME_PROD }}
          version_label: ${{ steps.version.outputs.label }}
          version_description: "Production release - Commit ${{ github.sha }} by ${{ github.actor }}"
          region: ${{ env.AWS_REGION }}
          deployment_package: ${{ env.ARTIFACT_NAME }}
          wait_for_deployment: true
          wait_for_environment_recovery: 300

      - name: Verify PROD deployment
        run: |
          echo "Deployment to PROD completed successfully"
          echo "Environment URL: http://${{ steps.deploy.outputs.environment_cname }}"
          echo "Version Label: ${{ steps.version.outputs.label }}"
          
          # Wait for application to be ready
          sleep 30
          
          # Test health endpoint
          HEALTH_URL="http://${{ steps.deploy.outputs.environment_cname }}/api/health"
          echo "Testing health endpoint: $HEALTH_URL"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")
          
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️  Health check returned HTTP $HTTP_CODE"
            echo "Application may still be starting up"
          fi

      - name: Create deployment summary
        run: |
          echo "## 🎉 PROD Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** PRODUCTION" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.version.outputs.label }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** http://${{ steps.deploy.outputs.environment_cname }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Production deployment complete" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment completion
        run: |
          echo "🚀 Production deployment completed successfully!"
          echo "The same artifact from DEV has been promoted to PROD"
